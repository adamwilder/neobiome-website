<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!--
    OG IMAGE TEMPLATE
    ─────────────────
    HOW TO EXPORT AS PNG:

    Option A — Chrome screenshot (simplest):
    1. Open this file in Chrome
    2. Open DevTools → press F12
    3. Click the device toolbar icon (looks like a phone/tablet, top-left of DevTools)
    4. Set dimensions to exactly 1200 × 630 in the size fields at the top
    5. Press Ctrl+Shift+P (or Cmd+Shift+P on Mac) → type "screenshot"
    6. Choose "Capture full size screenshot"
    7. Save the downloaded file as og-image.png into this /assets/ folder

    Option B — right-click the page → "Save as" won't work for PNG.
    Use Option A above.
  -->
  <title>OG Image Template — NeoBiome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background-color: #F6F4EF;
      font-family: 'DM Sans', sans-serif;
      position: relative;
    }

    /* Subtle ambient light */
    .ambient {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% -10%, rgba(143,175,140,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 55% 50% at 90% 110%,  rgba(187,143,78,0.10) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Topographic lines */
    .topo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Content */
    .card {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 80px 96px;
      gap: 0;
    }

    .tag {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #677C0F;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tag-line {
      display: inline-block;
      width: 24px;
      height: 1px;
      background: #BB8F4E;
      opacity: 0.6;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 108px;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .wordmark .neo   { color: #3C5E3C; }
    .wordmark .biome { color: #BB8F4E; }

    .tagline {
      font-size: 22px;
      font-weight: 300;
      line-height: 1.6;
      color: #58545A;
      max-width: 620px;
      margin-bottom: 44px;
    }

    .pills {
      display: flex;
      gap: 10px;
    }

    .pill {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #8FAF8C;
      padding: 6px 18px;
      border: 1px solid #C9D9C4;
      border-radius: 100px;
      background: rgba(201,217,196,0.18);
    }

    /* Status dot — bottom right */
    .status {
      position: absolute;
      bottom: 52px;
      right: 80px;
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8FAF8C;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9AA84D;
    }

    /* Domain — bottom left */
    .domain {
      position: absolute;
      bottom: 52px;
      left: 96px;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: #C9D9C4;
    }

    /* Vertical accent bar */
    .accent-bar {
      position: absolute;
      top: 0;
      right: 0;
      width: 6px;
      height: 100%;
      background: linear-gradient(to bottom, #3C5E3C, #BB8F4E);
      opacity: 0.35;
    }
  </style>
</head>
<body>

  <div class="ambient"></div>

  <!-- Topographic lines -->
  <svg class="topo" aria-hidden="true" viewBox="0 0 1200 630"
       preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <path d="M-100,80  C 200,58  500,120 800,78  C1100,36  1250,88  1300,70"  fill="none" stroke="#3C5E3C" stroke-width="1" opacity="0.05"/>
    <path d="M-100,160 C 180,136 460,200 760,158 C1060,116 1240,172 1300,150" fill="none" stroke="#3C5E3C" stroke-width="1" opacity="0.045"/>
    <path d="M-100,245 C 200,220 500,285 800,242 C1100,200 1250,256 1300,234" fill="none" stroke="#BB8F4E" stroke-width="0.8" opacity="0.04"/>
    <path d="M-100,335 C 180,310 460,375 760,332 C1060,290 1240,346 1300,323" fill="none" stroke="#3C5E3C" stroke-width="1" opacity="0.038"/>
    <path d="M-100,425 C 200,400 500,465 800,422 C1100,380 1250,436 1300,413" fill="none" stroke="#3C5E3C" stroke-width="0.8" opacity="0.032"/>
    <path d="M-100,515 C 180,490 460,555 760,512 C1060,470 1240,526 1300,503" fill="none" stroke="#BB8F4E" stroke-width="0.7" opacity="0.025"/>
  </svg>

  <div class="card">

    <div class="tag">
      <span class="tag-line"></span>
      Research Project &nbsp;&middot;&nbsp; New Zealand
      <span class="tag-line"></span>
    </div>

    <div class="wordmark">
      <span class="neo">NEO</span><span class="biome">BIOME</span>
    </div>

    <p class="tagline">
      Research interviews now open &mdash; exploring how community,
      regenerative systems, and emerging technology converge toward human flourishing.
    </p>

    <div class="pills">
      <span class="pill">Community</span>
      <span class="pill">Regenerative Systems</span>
      <span class="pill">Emerging Technology</span>
    </div>

  </div>

  <div class="status">
    <span class="dot"></span>
    <span>Interviews open</span>
  </div>

  <div class="domain">https://research.neobio.me</div>

  <div class="accent-bar"></div>

</body>
</html>
